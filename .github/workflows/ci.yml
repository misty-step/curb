name: CI

# Runs the repository gate (scripts/validate.sh) on every PR and on pushes to
# master, across macOS and Linux. This is the automated enforcement of the gate
# that previously only ran when a human remembered to.

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Run repository gate
        run: bash scripts/validate.sh

  coverage:
    name: coverage
    # Generates Rust line coverage and fails below a calibrated floor.
    # Baseline measured 2026-05-29 with cargo-llvm-cov 0.8.7 on the full suite
    # (curb-core lib + curb bin + integration tests): TOTAL line coverage 86.37%.
    # Floor = floor(86.37) - 2 = 84, a small margin so it passes on creation.
    #
    # THE FLOOR RATCHETS UP. As coverage rises, raise this number. NEVER lower it
    # to get a red build green — that defeats the regression guard.
    #
    # Coverage runs on macOS because the real-process e2e enforcement test is
    # macOS-gated (see tests/e2e_enforcement.rs / backlog 014); running coverage
    # there includes it and matches the measured baseline. The crate compiles
    # without a UI build because build.rs embeds the committed web/dist.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (llvm-tools-preview)
        run: rustup component add llvm-tools-preview

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage and enforce the floor
        # Prints the per-file + TOTAL summary to the job log and exits non-zero
        # if TOTAL line coverage drops below the floor. --workspace covers both
        # the curb binary and the curb-core library crate.
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 84

      - name: Generate lcov report
        if: always()
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
