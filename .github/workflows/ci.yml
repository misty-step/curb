name: CI

# Runs the repository gate (scripts/validate.sh) on every PR and on pushes to
# master, across macOS and Linux, plus a focused Windows smoke for the portable
# process/notification paths that the full desktop gate cannot exercise there.

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-feedback:
    name: fast feedback (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install Playwright browser
        run: npx playwright install chromium
        working-directory: ui

      - name: Run fast feedback gate
        run: bash scripts/check-fast.sh

  full-validate:
    name: full validate (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (rustfmt + clippy)
        run: rustup component add rustfmt clippy

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Install Playwright browser
        run: npx playwright install chromium
        working-directory: ui

      - name: Run repository gate
        run: bash scripts/validate.sh

  windows-smoke:
    name: windows smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup component add rustfmt clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Compile Rust binary on Windows
        run: cargo build --bin curb

      - name: Validate example config
        run: cargo run -- validate-config configs/curb.example.yaml

      - name: Check notification capability contract
        run: cargo test -p curb-core notification_capability_reports_platform_support -- --nocapture

      - name: Check Windows termination command contract
        run: cargo test -p curb-core windows_termination_command_uses_absolute_taskkill_path -- --nocapture

  dependency-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Run dependency advisory audit
        run: bash scripts/check-dependency-audit.sh --online

  coverage:
    name: coverage
    # Generates Rust line coverage and fails below a calibrated floor.
    # Baseline measured 2026-05-29 with cargo-llvm-cov 0.8.7 on the full suite
    # (curb-core lib + curb bin + integration tests): TOTAL line coverage 86.37%.
    # Floor = floor(86.37) - 2 = 84, a small margin so it passes on creation.
    #
    # THE FLOOR RATCHETS UP. As coverage rises, raise this number. NEVER lower it
    # to get a red build green — that defeats the regression guard.
    #
    # Coverage runs on macOS because the real-process e2e enforcement test is
    # macOS-gated (see tests/e2e_enforcement.rs / backlog 014); running coverage
    # there includes it and matches the measured baseline. The crate compiles
    # without a UI build because build.rs embeds the committed web/dist.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain (llvm-tools-preview)
        run: rustup component add llvm-tools-preview

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage and enforce the floor
        # Prints the per-file + TOTAL summary to the job log and exits non-zero
        # if TOTAL line coverage drops below the floor. --workspace covers both
        # the curb binary and the curb-core library crate.
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 84

      - name: Generate lcov report
        if: always()
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-lcov
          path: lcov.info
